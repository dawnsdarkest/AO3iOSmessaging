<!--LIGHTMODE-->
<div class="container">
	<div class="header">
		<p><img class="headerimg" src="INSERT IMAGE LINK" alt="image description (optional) width="40em" /><br/><span class="hide"><strong>Groupchat/To: </strong></span>Character Username</p>
	</div>
	<div class="chat-box">
		<!--"in" on L, "out" on R-->
		<!--"1" no tail, "2" with tail-->
		<p class="in2"><span class="hide">Person A: <br></span>TEXT</p>
		<p class="out2"><span class="hide">Person B: <br></span>TEXT</p>
    
		<!--GROUP MSG RECEIVED-->
		<!--"group" in class definition for added space above the first text (only add in the class for the 1st text);
    "member" class for name on text.-->
    <!--"out" message (sent) same as in 1v1 chats-->
		<p class="in1 group"><span class="member">Character</span><span class="hide">: <br></span>TEXT</p>
    <p class="in2 group"><span class="member">Character</span><span class="hide">: <br></span>TEXT</p>

		<!--SENT PICTURE NO TAIL-->
		<p class="out1 picture"><span class="hide">>Person A: <br></span><img src="URL" alt="text" width="40%"></p> 
		<!--RECEIVED PICTURE NO TAIL-->
		<p class="in1 picture"><span class="hide">Person B: <br></span><img src="URL" alt="text" width="40%"> 

		
	</div>
<p class="footer"><span class="footer-circle"></span> <span class="footer-message"></span></p>
</div>

	<!--TIME INDICATOR-->
	<p class="time"><b>Mon, 26 Jan</b> 07:45 PM</p>
	<!--SOLO EMOJIS-->
	<p class="lemoji">💕</p> <!--on the L-->
	<p class="remoji">💕</p> <!--on the R-->
	<!--SEEN/DELIVERED-->
	<p class="read"><span class="hide">// Text marked as: </span>Seen</p> 


	<!--DARKMODE-->
	<div class="dark-container">
	<div class="dark-header">	<p><img class="headerimg" src="INSERT IMAGE LINK" alt="image description (optional) width="40em" /><br/><span class="hide"><strong>Groupchat/To: </strong></span>Character Username</p>
	</div>
    <div class="dark-chat-box">
			<p class="darkin1"></p>
			<p class="darkin2"></p>
      <p class="darkin1 group"><span class="member">Character</span><span class="hide">: <br></span></p>
      <p class="darkin2 group"><span class="member">Character</span><span class="hide">: <br></span></p>
      <!--Sent texts (out1/2) are the same in darkmode, no change to the tag-->
      </div>
  <p class="dark-footer"><span class="dark-footer-circle"></span> <span class="dark-footer-message"></span></p>
  </div>
